<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yükleniyor…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at 50% 45%, #1a1a1a 0%, #0b0b0b 55%, #000000 100%);
    font-family: "Didot", "Bodoni MT", "Playfair Display", Georgia, serif;
  }

  .hypno-loader {
    position: fixed;
    inset: 0;
  }

  /* ---------- Arka plan: sonsuz halkalar ---------- */
  .rings {
    position: absolute;
    inset: 0;
    background: repeating-radial-gradient(circle at 50% 50%,
      rgba(255, 255, 255, 0.045) 0 1px, transparent 1px 64px);
    animation: ringsBreathe 5.2s ease-in-out infinite;
  }

  @keyframes ringsBreathe {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  /* ---------- Göz — ekranın tam ortasında sabit ---------- */
  .eye-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: grid;
    place-items: center;
    filter: drop-shadow(0 0 26px rgba(255, 255, 255, 0.28));
    z-index: 2;
  }

  .burst {
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.65);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), inset 0 0 12px rgba(255, 255, 255, 0.18);
    animation: burst 3.9s ease-out infinite;
    pointer-events: none;
  }

  .burst:nth-child(2) { animation-delay: 1.3s; }
  .burst:nth-child(3) { animation-delay: 2.6s; }

  @keyframes burst {
    0%   { transform: scale(0.4); opacity: 0.8; }
    100% { transform: scale(4.2); opacity: 0; }
  }

  .eye {
    position: relative;
    width: 300px;
    height: 160px;
    background: radial-gradient(circle at 50% 45%, #ffffff 0%, #ececec 65%, #c4c4c4 100%);
    clip-path: path("M10,80 Q150,-30 290,80 Q150,190 10,80 Z");
    animation: blink 5.2s infinite;
  }

  @keyframes blink {
    0%, 91%, 100% { clip-path: path("M10,80 Q150,-30 290,80 Q150,190 10,80 Z"); }
    94%, 96%      { clip-path: path("M10,80 Q150,72 290,80 Q150,88 10,80 Z"); }
  }

  /* iris saati takip eder — sarkaçla aynı süre ve easing */
  .iris-track {
    position: absolute;
    left: 50%;
    top: 50%;
    animation: follow 2.6s ease-in-out infinite alternate;
  }

  @keyframes follow {
    from { transform: translate(calc(-50% - 34px), -50%); }
    to   { transform: translate(calc(-50% + 34px), -50%); }
  }

  /* saatin yayını dikeyde de izler: uçlarda yukarı, ortada aşağı.
     Yatay periyodun yarısı (1.3s) — sarkacın yükselme ritmiyle aynı */
  .iris-bob {
    position: relative;
    animation: bob 1.3s ease-in-out infinite alternate;
  }

  @keyframes bob {
    from { transform: translateY(-9px); }
    to   { transform: translateY(7px); }
  }

  .iris {
    width: 112px;
    height: 112px;
    border-radius: 50%;
    background:
      radial-gradient(circle, rgba(0, 0, 0, 0) 26%, rgba(0, 0, 0, 0.5) 72%),
      repeating-conic-gradient(from 0deg, #000000 0deg 18deg, #ffffff 18deg 36deg);
    box-shadow: 0 0 18px rgba(255, 255, 255, 0.45);
    animation: spinIris 5s linear infinite;
  }

  @keyframes spinIris {
    to { transform: rotate(360deg); }
  }

  /* saat her önünden geçtiğinde gözbebeği büyür */
  .pupil {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 38px;
    height: 38px;
    transform: translate(-50%, -50%) scale(1);
    border-radius: 50%;
    background: #000000;
    box-shadow: 0 0 14px rgba(255, 255, 255, 0.55);
    animation: dilate 2.6s ease-in-out infinite;
  }

  @keyframes dilate {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50%      { transform: translate(-50%, -50%) scale(1.4); }
  }

  .shine {
    position: absolute;
    left: 32%;
    top: 30%;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.85);
    filter: blur(2px);
  }

  /* ---------- Sarkaç — göze kadar iner, önünden geçer ---------- */
  .pendulum {
    position: absolute;
    top: -14px;
    left: 50%;
    transform-origin: 50% 0;
    animation: swing 2.6s ease-in-out infinite alternate;
    z-index: 6;
  }

  /* CSS'te pozitif rotate, sarkan ucu SOLA götürür — iris follow ile aynı fazda
     başlaması için pozitiften başlar */
  @keyframes swing {
    from { transform: translateX(-50%) rotate(19deg); }
    to   { transform: translateX(-50%) rotate(-19deg); }
  }

  /* hayalet izler: aynı sarkaç, faz kaymalı ve soluk */
  .pendulum.ghost1 { animation-delay: -0.1s; opacity: 0.28; z-index: 5; }
  .pendulum.ghost2 { animation-delay: -0.2s; opacity: 0.12; z-index: 4; filter: blur(1px); }

  .chain {
    width: 3px;
    height: calc(50vh - 100px);
    min-height: 140px;
    margin: 0 auto;
    background: repeating-linear-gradient(to bottom, #cfcfcf 0 8px, transparent 8px 13px);
  }

  .bow { /* askı halkası */
    width: 24px;
    height: 24px;
    margin: 0 auto -7px;
    border: 3px solid #ededed;
    border-radius: 50%;
  }

  .watch {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto;
    border-radius: 50%;
    border: 5px solid #ededed;
    background: #0a0a0a;
    box-shadow: 0 0 0 3px #0a0a0a, 0 0 0 5px #b8b8b8, 0 0 18px rgba(255, 255, 255, 0.22);
    animation: watchGlow 2.6s ease-in-out infinite;
  }

  /* gözün önünden geçerken (salınımın ortasında) parlar */
  @keyframes watchGlow {
    0%, 100% {
      box-shadow: 0 0 0 3px #0a0a0a, 0 0 0 5px #b8b8b8,
                  0 0 18px rgba(255, 255, 255, 0.22);
    }
    50% {
      box-shadow: 0 0 0 3px #0a0a0a, 0 0 0 5px #ffffff,
                  0 0 46px rgba(255, 255, 255, 0.65);
    }
  }

  .watch::before { /* kurma kolu */
    content: "";
    position: absolute;
    top: -21px;
    left: 50%;
    width: 16px;
    height: 13px;
    transform: translateX(-50%);
    border-radius: 3px;
    background: #ededed;
    z-index: 2;
  }

  .watch::after { /* cam parlaması */
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: linear-gradient(140deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 42%);
    z-index: 4;
    pointer-events: none;
  }

  /* sade beyaz kadran + dakika çentikleri */
  .face {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      repeating-conic-gradient(from -1.5deg, rgba(0, 0, 0, 0.45) 0deg 3deg, transparent 3deg 30deg),
      radial-gradient(circle at 38% 32%, #ffffff 0%, #f2f2f2 55%, #d6d6d6 100%);
  }

  .face::before { /* çentikleri kadranın kenarına sınırla */
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff 0%, #f4f4f4 58%, transparent 72%);
  }

  .hand {
    position: absolute;
    left: 50%;
    bottom: 50%;
    transform-origin: 50% 100%;
    border-radius: 2px;
    background: #111111;
    z-index: 2;
  }

  .hand.hour   { width: 6px; height: 36px; margin-left: -3px; animation: tick 12s linear infinite; }
  .hand.minute { width: 4px; height: 50px; margin-left: -2px; animation: tick 3s linear infinite; }
  .hand.second {
    width: 2px;
    height: 58px;
    margin-left: -1px;
    background: #444444;
    animation: tick 1.2s linear infinite;
  }

  @keyframes tick {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .watch .pin {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 12px;
    height: 12px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #111111;
    z-index: 3;
  }

  /* ---------- Yazı ---------- */
  .label {
    position: absolute;
    left: 50%;
    top: calc(50% + 150px);
    transform: translateX(-50%);
    text-align: center;
    color: #e0e0e0;
    letter-spacing: 0.45em;
    text-indent: 0.45em; /* letter-spacing'in sağa kaydırmasını dengeler */
    text-transform: uppercase;
    font-size: 17px;
    font-weight: 400;
    white-space: nowrap;
    animation: fadeText 2.6s ease-in-out infinite;
    z-index: 8;
  }

  .label small {
    display: block;
    margin-top: 12px;
    font-size: 12px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.2em;
    color: #8a8a8a;
    text-transform: none;
  }

  @keyframes fadeText {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  .dots::after {
    content: "";
    animation: dots 1.8s steps(4) infinite;
  }

  @keyframes dots {
    0%   { content: ""; }
    25%  { content: "."; }
    50%  { content: ".."; }
    75%  { content: "..."; }
  }

  /* ---------- Film-noir kaplama ---------- */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(to bottom,
      rgba(255, 255, 255, 0.022) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 10;
  }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, transparent 42%, rgba(0, 0, 0, 0.8) 100%);
    pointer-events: none;
    z-index: 11;
  }

  @media (prefers-reduced-motion: reduce) {
    .pendulum, .iris-track, .iris-bob, .iris, .burst, .hand, .pupil, .rings, .eye, .watch { animation: none; }
    .iris-track { transform: translate(-50%, -50%); }
    .pendulum.ghost1, .pendulum.ghost2 { display: none; }
  }
</style>
</head>
<body>
  <div class="hypno-loader" role="status" aria-label="Yükleniyor">
    <div class="rings" aria-hidden="true"></div>

    <div class="eye-wrap" aria-hidden="true">
      <div class="burst"></div>
      <div class="burst"></div>
      <div class="burst"></div>
      <div class="eye">
        <div class="iris-track">
          <div class="iris-bob">
            <div class="iris"></div>
            <div class="pupil"></div>
            <div class="shine"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="pendulum ghost2" aria-hidden="true">
      <div class="chain"></div>
      <div class="bow"></div>
      <div class="watch"><div class="face"></div></div>
    </div>
    <div class="pendulum ghost1" aria-hidden="true">
      <div class="chain"></div>
      <div class="bow"></div>
      <div class="watch"><div class="face"></div></div>
    </div>
    <div class="pendulum" aria-hidden="true">
      <div class="chain"></div>
      <div class="bow"></div>
      <div class="watch">
        <div class="face"></div>
        <div class="hand hour"></div>
        <div class="hand minute"></div>
        <div class="hand second"></div>
        <div class="pin"></div>
      </div>
    </div>

    <div class="label">
      Yükleniyor<span class="dots"></span>
      <small>İzlemeye devam edin…</small>
    </div>

    <div class="scanlines" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
  </div>
</body>
</html>
